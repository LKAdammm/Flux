<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux - Connexion</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M3 3v18h18'/><path d='m19 9-5 5-4-4-3 3'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: #e4e4e7; }
    </style>
</head>
<body class="antialiased font-sans flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-8 bg-zinc-900 rounded-2xl border border-zinc-800 shadow-2xl mx-4">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-indigo-600 mb-4 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">Flux</h1>
            <p class="text-zinc-500 mt-1 text-sm">Gérez votre trésorerie simplement.</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-zinc-400 mb-1.5 uppercase tracking-wider">Adresse e-mail</label>
                <input type="email" id="email" class="w-full px-3 py-2.5 rounded-lg border border-zinc-700 bg-zinc-950 text-white placeholder-zinc-600 focus:outline-none focus:border-indigo-500 transition text-sm" placeholder="adam@exemple.com" required>
            </div>
            <div>
                <label class="block text-xs font-semibold text-zinc-400 mb-1.5 uppercase tracking-wider">Mot de passe</label>
                <input type="password" id="password" class="w-full px-3 py-2.5 rounded-lg border border-zinc-700 bg-zinc-950 text-white placeholder-zinc-600 focus:outline-none focus:border-indigo-500 transition text-sm" placeholder="••••••••" required>
            </div>

            <div id="error-message" class="hidden text-rose-400 text-sm font-medium text-center bg-rose-900/30 p-3 rounded-lg border border-rose-800/50"></div>

            <button type="submit" id="login-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2.5 rounded-lg font-semibold text-sm transition shadow-sm flex justify-center items-center">
                Se connecter
            </button>
        </form>

        <div class="mt-4 pt-4 border-t border-zinc-800">
            <p class="text-center text-zinc-500 text-xs mb-3">Pas encore de compte ?</p>
            <button id="signup-btn" class="w-full bg-zinc-800 hover:bg-zinc-700 text-zinc-200 px-4 py-2.5 rounded-lg font-semibold text-sm transition border border-zinc-700">
                Créer un compte
            </button>
        </div>

        <p class="text-center text-zinc-600 text-xs mt-6">Sécurisé par Supabase</p>
    </div>

    <script type="module" src="./js/auth.js"></script>
</body>
</html>
