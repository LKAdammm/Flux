<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux - Tableau de bord</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M3 3v18h18'/><path d='m19 9-5 5-4-4-3 3'/></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>

    <style>
        body { background-color: #09090b; color: #e4e4e7; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
        .chart-container { position: relative; width: 100%; height: 300px; }
        .doughnut-container { position: relative; width: 100%; height: 200px; }
        .month-card-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out, opacity 0.2s ease-out; opacity: 0; }
        .month-card-content.active { max-height: 2000px; opacity: 1; }
        /* Drawer */
        #transaction-drawer {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #drawer-overlay {
            transition: opacity 0.3s ease;
            opacity: 0;
        }
    </style>
</head>
<body class="antialiased font-sans flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-zinc-900/90 backdrop-blur-md border-b border-zinc-800 sticky top-0 z-40" data-html2canvas-ignore>
        <div class="max-w-[1400px] mx-auto px-4 sm:px-6 h-14 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3 min-w-0">
                <div class="w-7 h-7 rounded bg-indigo-600 flex items-center justify-center shrink-0">
                    <i data-lucide="bar-chart-2" class="w-4 h-4 text-white"></i>
                </div>
                <span class="text-lg font-bold text-white tracking-tight">Flux</span>
                <span id="save-status" class="hidden text-[10px] px-2 py-0.5 rounded border border-zinc-800 ml-2 font-medium text-zinc-400"></span>
            </div>
            <div class="flex items-center gap-2">
                <!-- Bouton ouvrir drawer -->
                <button onclick="window.toggleDrawer()"
                        class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-semibold px-3 py-1.5 rounded-md transition flex items-center gap-1.5 shadow-sm">
                    <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                    <span class="hidden sm:inline">Transaction</span>
                </button>
                <button onclick="window.logout()"
                        class="text-xs font-medium text-zinc-400 hover:text-white transition-colors flex items-center gap-1.5 bg-zinc-900 px-3 py-1.5 rounded-md border border-zinc-800 hover:border-zinc-700 shrink-0">
                    <span class="hidden sm:inline">Se déconnecter</span>
                    <i data-lucide="log-out" class="w-3.5 h-3.5"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Drawer overlay -->
    <div id="drawer-overlay" onclick="window.closeDrawer()" class="hidden fixed inset-0 bg-black/40 z-40" data-html2canvas-ignore></div>

    <!-- Drawer (panneau coulissant) -->
    <aside id="transaction-drawer"
           class="fixed top-0 right-0 h-full w-full max-w-md bg-zinc-900 border-l border-zinc-800 shadow-2xl z-50 translate-x-full overflow-y-auto"
           data-html2canvas-ignore>

        <!-- Drawer header -->
        <div class="sticky top-0 bg-zinc-900/95 backdrop-blur-sm border-b border-zinc-800 px-5 py-4 flex items-center justify-between z-10">
            <h2 id="form-title" class="text-sm font-semibold text-white flex items-center gap-2">
                <i data-lucide="plus-circle" class="w-4 h-4 text-indigo-500"></i> Nouvelle transaction
            </h2>
            <button onclick="window.closeDrawer()" class="p-1.5 text-zinc-400 hover:text-white transition-colors rounded-md hover:bg-zinc-800">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>

        <!-- Formulaire -->
        <form onsubmit="window.handleAddTransaction(event)" id="transaction-form" class="px-5 py-5 space-y-4 border-b border-zinc-800">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] font-semibold text-zinc-500 mb-1 uppercase tracking-widest">Période</label>
                    <select id="form-month" class="w-full px-2.5 py-2 rounded-md border border-zinc-700 bg-zinc-950 text-zinc-200 text-xs focus:border-indigo-500 outline-none transition" required></select>
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-zinc-500 mb-1 uppercase tracking-widest">Nature</label>
                    <select id="form-type" onchange="window.updateCategoryOptions()" class="w-full px-2.5 py-2 rounded-md border border-zinc-700 bg-zinc-950 text-zinc-200 text-xs focus:border-indigo-500 outline-none transition" required>
                        <option value="expenses">Décaissement (Sortie)</option>
                        <option value="incomes">Encaissement (Entrée)</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-semibold text-zinc-500 mb-1 uppercase tracking-widest">Catégorie</label>
                <select id="form-category" class="w-full px-2.5 py-2 rounded-md border border-zinc-700 bg-zinc-950 text-zinc-200 text-xs focus:border-indigo-500 outline-none transition" required></select>
            </div>

            <div>
                <label class="block text-[10px] font-semibold text-zinc-500 mb-1 uppercase tracking-widest">Description</label>
                <input type="text" id="form-label" placeholder="Ex : Fournisseur, Salaire…"
                       class="w-full px-2.5 py-2 rounded-md border border-zinc-700 bg-zinc-950 text-zinc-200 text-xs focus:border-indigo-500 outline-none transition placeholder-zinc-600" required>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] font-semibold text-zinc-500 mb-1 uppercase tracking-widest">Montant (EUR)</label>
                    <input type="number" id="form-amount" step="0.01" min="0.01" placeholder="0.00"
                           class="w-full px-2.5 py-2 rounded-md border border-zinc-700 bg-zinc-950 text-zinc-200 text-xs font-mono focus:border-indigo-500 outline-none transition placeholder-zinc-600" required>
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-zinc-500 mb-1 uppercase tracking-widest">Jour</label>
                    <input type="number" id="form-day" min="1" max="31" placeholder="Ex : 5"
                           class="w-full px-2.5 py-2 rounded-md border border-zinc-700 bg-zinc-950 text-zinc-200 text-xs font-mono focus:border-indigo-500 outline-none transition placeholder-zinc-600" required>
                </div>
            </div>

            <!-- Récurrence -->
            <div id="recurring-container" class="pt-3 border-t border-zinc-800">
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="form-recurring" onchange="window.toggleRecurringOptions()"
                           class="w-3.5 h-3.5 text-indigo-600 bg-zinc-950 border-zinc-700 rounded cursor-pointer">
                    <label for="form-recurring" class="text-xs text-zinc-400 cursor-pointer hover:text-zinc-200">Planifier une récurrence</label>
                </div>

                <div id="recurring-duration-container" class="hidden mt-3 pl-5 space-y-3">
                    <!-- Durée -->
                    <div>
                        <label class="block text-[10px] font-semibold text-zinc-500 mb-1 uppercase tracking-widest">Durée</label>
                        <select id="form-recurring-duration"
                                onchange="document.getElementById('form-recurring-custom-wrap').classList.toggle('hidden', this.value !== 'custom')"
                                class="w-full px-2.5 py-2 rounded-md border border-zinc-700 bg-zinc-950 text-zinc-200 text-xs focus:border-indigo-500 outline-none transition">
                            <option value="all">Jusqu'à la fin de l'exercice</option>
                            <option value="2">2 mois</option>
                            <option value="3">1 trimestre (3 mois)</option>
                            <option value="6">1 semestre (6 mois)</option>
                            <option value="12">1 an (12 mois)</option>
                            <option value="24">2 ans (24 mois)</option>
                            <option value="custom">Personnalisé…</option>
                        </select>
                    </div>
                    <!-- Durée personnalisée -->
                    <div id="form-recurring-custom-wrap" class="hidden">
                        <label class="block text-[10px] font-semibold text-zinc-500 mb-1 uppercase tracking-widest">Nombre de mois</label>
                        <input type="number" id="form-recurring-custom" min="1" max="120" value="6" placeholder="6"
                               class="w-full px-2.5 py-2 rounded-md border border-zinc-700 bg-zinc-950 text-zinc-200 text-xs font-mono focus:border-indigo-500 outline-none transition">
                    </div>
                    <!-- Fréquence -->
                    <div>
                        <label class="block text-[10px] font-semibold text-zinc-500 mb-1 uppercase tracking-widest">Fréquence</label>
                        <select id="form-recurring-freq"
                                class="w-full px-2.5 py-2 rounded-md border border-zinc-700 bg-zinc-950 text-zinc-200 text-xs focus:border-indigo-500 outline-none transition">
                            <option value="1">Chaque mois</option>
                            <option value="2">Tous les 2 mois</option>
                            <option value="3">Trimestriel (tous les 3 mois)</option>
                            <option value="6">Semestriel (tous les 6 mois)</option>
                            <option value="12">Annuel (tous les 12 mois)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="flex gap-2 pt-1">
                <button type="submit" id="submit-btn"
                        class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-xs py-2.5 rounded-md transition flex justify-center items-center gap-2">
                    Enregistrer
                </button>
                <button type="button" id="cancel-edit-btn" onclick="window.cancelEdit()"
                        class="hidden bg-zinc-800 hover:bg-zinc-700 text-zinc-300 py-2.5 px-3 rounded-md transition">
                    <i data-lucide="x" class="w-3.5 h-3.5"></i>
                </button>
            </div>
        </form>

        <!-- Édition rapide dans le drawer -->
        <div class="px-5 py-4">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-[10px] font-semibold text-zinc-500 uppercase tracking-widest">Transactions</h3>
                <button onclick="window.resetData()" class="text-[10px] font-semibold text-rose-500/60 hover:text-rose-400 transition">
                    Réinitialiser
                </button>
            </div>
            <div id="editor-lists-container" class="space-y-3 max-h-[50vh] overflow-y-auto"></div>
        </div>
    </aside>

    <!-- Contenu principal (pleine largeur maintenant) -->
    <main id="export-area" class="flex-1 max-w-[1200px] w-full mx-auto px-4 sm:px-6 py-6 space-y-5">

        <!-- Barre de contrôles : filtre + objectif + export -->
        <div class="bg-zinc-900 rounded-xl border border-zinc-800 shadow-sm overflow-hidden" data-html2canvas-ignore>
            <!-- Ligne 1 : filtre + export -->
            <div class="px-4 py-3 flex flex-wrap items-center justify-between gap-3 border-b border-zinc-800">
                <div class="flex items-center gap-2 bg-zinc-950 px-3 py-1.5 rounded-md border border-zinc-800">
                    <span class="text-[10px] font-semibold text-zinc-500 uppercase tracking-wider">Période</span>
                    <select id="filter-start" onchange="window.updateApp()"
                            class="bg-zinc-950 text-zinc-200 text-xs focus:outline-none cursor-pointer"></select>
                    <i data-lucide="arrow-right" class="w-3 h-3 text-zinc-600 shrink-0"></i>
                    <select id="filter-end" onchange="window.updateApp()"
                            class="bg-zinc-950 text-zinc-200 text-xs focus:outline-none cursor-pointer"></select>
                </div>
                <button onclick="window.exportPDF()"
                        class="bg-zinc-100 hover:bg-white text-zinc-900 text-xs font-semibold px-3 py-1.5 rounded-md transition shadow-sm flex items-center gap-1.5 whitespace-nowrap">
                    <i data-lucide="download" class="w-3.5 h-3.5"></i> Exporter PDF
                </button>
            </div>
            <!-- Ligne 2 : objectif -->
            <div class="px-4 py-3">
                <div class="flex flex-wrap items-center gap-3">
                    <div class="flex items-center gap-2 shrink-0">
                        <input type="checkbox" id="goal-active" onchange="window.updateGoal()"
                               class="w-3.5 h-3.5 text-indigo-600 bg-zinc-950 border-zinc-600 rounded cursor-pointer">
                        <span class="text-[10px] font-semibold text-zinc-500 uppercase tracking-widest whitespace-nowrap">Objectif</span>
                    </div>
                    <input type="text" id="goal-name" onchange="window.updateGoal()"
                           placeholder="Description de l'objectif..."
                           title=""
                           class="bg-transparent border-b border-zinc-700 focus:border-indigo-500 text-zinc-200 text-xs outline-none placeholder-zinc-600 min-w-0 flex-1 max-w-xs">
                    <div class="flex items-center gap-1.5 shrink-0">
                        <input type="number" id="goal-input" onchange="window.updateGoal()"
                               class="bg-zinc-950 border border-zinc-800 rounded px-2 py-1 text-zinc-200 w-24 text-xs font-mono focus:outline-none focus:border-indigo-500" value="1000">
                        <span class="text-[10px] font-semibold text-zinc-500">EUR</span>
                    </div>
                    <span id="goal-percent" class="text-xs font-bold text-indigo-400 hidden ml-auto shrink-0">0%</span>
                </div>
                <div id="goal-bar-container" class="hidden mt-2 w-full bg-zinc-950 rounded-full h-1.5 border border-zinc-800 overflow-hidden">
                    <div id="goal-bar" class="bg-indigo-600 h-1.5 rounded-full transition-all duration-500 w-0"></div>
                </div>
            </div>
        </div>

        <!-- KPIs (4 colonnes) -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="bg-zinc-900/60 p-4 rounded-xl border border-zinc-800 shadow-sm">
                <div class="flex items-center justify-between mb-1">
                    <p class="text-[10px] font-semibold text-zinc-500 uppercase tracking-widest">Encaissements</p>
                    <span id="trend-incomes" class="kpi-trend"></span>
                </div>
                <p id="kpi-incomes" class="text-xl font-semibold text-emerald-500 tabular-nums">0 €</p>
            </div>
            <div class="bg-zinc-900/60 p-4 rounded-xl border border-zinc-800 shadow-sm">
                <div class="flex items-center justify-between mb-1">
                    <p class="text-[10px] font-semibold text-zinc-500 uppercase tracking-widest">Décaissements</p>
                    <span id="trend-expenses" class="kpi-trend"></span>
                </div>
                <p id="kpi-expenses" class="text-xl font-semibold text-rose-500 tabular-nums">0 €</p>
            </div>
            <div class="bg-zinc-900 p-4 rounded-xl border border-indigo-900/40 shadow-sm relative overflow-hidden">
                <div class="absolute inset-0 bg-indigo-500/5 pointer-events-none"></div>
                <p class="text-[10px] font-semibold text-zinc-400 uppercase tracking-widest mb-1 relative z-10">Trésorerie Nette</p>
                <p id="kpi-balance" class="text-2xl font-bold text-white relative z-10 tabular-nums">0 €</p>
            </div>
            <div class="bg-zinc-900/60 p-4 rounded-xl border border-zinc-800 shadow-sm">
                <p class="text-[10px] font-semibold text-zinc-500 uppercase tracking-widest mb-1">Taux d'épargne</p>
                <p id="kpi-savings-rate" class="text-xl font-bold text-zinc-500 tabular-nums">—</p>
            </div>
        </div>

        <!-- Graphiques (3 colonnes) -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
            <div class="bg-zinc-900 p-5 rounded-xl border border-zinc-800 shadow-sm lg:col-span-2">
                <h2 class="text-[10px] font-semibold text-zinc-500 uppercase tracking-widest mb-4">Évolution du solde</h2>
                <div class="chart-container"><canvas id="financeChart"></canvas></div>
            </div>
            <div class="bg-zinc-900 p-5 rounded-xl border border-zinc-800 shadow-sm flex flex-col">
                <h2 class="text-[10px] font-semibold text-zinc-500 uppercase tracking-widest mb-4">Répartition des charges</h2>
                <div class="doughnut-container flex-1"><canvas id="categoryChart"></canvas></div>
            </div>
            <div class="bg-zinc-900 p-5 rounded-xl border border-zinc-800 shadow-sm flex flex-col">
                <h2 class="text-[10px] font-semibold text-zinc-500 uppercase tracking-widest mb-4">Sources de revenus</h2>
                <div class="doughnut-container flex-1"><canvas id="incomeChart"></canvas></div>
            </div>
        </div>

        <!-- Historique mensuel -->
        <div>
            <div class="flex items-center justify-between mb-4 mt-4" data-html2canvas-ignore>
                <h2 class="text-base font-semibold text-zinc-100 tracking-tight">Historique mensuel</h2>
                <button onclick="window.addNextMonth()"
                        class="text-xs font-medium bg-zinc-800 hover:bg-zinc-700 text-zinc-200 px-3 py-1.5 rounded-md transition border border-zinc-700 flex items-center gap-1.5">
                    <i data-lucide="plus" class="w-3 h-3"></i> Nouvelle période
                </button>
            </div>
            <div id="monthly-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
    </main>

    <script type="module" src="./js/dashboard.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
