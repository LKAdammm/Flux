<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1c1917; color: #d6d3d1; }
        .icon-symbol { font-family: 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif; }
    </style>
</head>
<body class="antialiased selection:bg-stone-700 selection:text-white font-sans flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-8 bg-stone-800 rounded-3xl border border-stone-700 shadow-2xl">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-900/50 border border-indigo-800 mb-4">
                <span class="text-3xl icon-symbol">🚀</span>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Flux</h1>
            <p class="text-stone-400 mt-2 text-sm">Gérez votre trésorerie simplement.</p>
        </div>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-stone-400 mb-1 uppercase tracking-wider">Adresse E-mail</label>
                <input type="email" id="email" class="w-full p-3 rounded-xl border border-stone-600 bg-stone-900 text-white placeholder-stone-500 focus:outline-none focus:border-indigo-500 transition" placeholder="adam@exemple.com" required>
            </div>
            <div>
                <label class="block text-xs font-bold text-stone-400 mb-1 uppercase tracking-wider">Mot de passe</label>
                <input type="password" id="password" class="w-full p-3 rounded-xl border border-stone-600 bg-stone-900 text-white placeholder-stone-500 focus:outline-none focus:border-indigo-500 transition" placeholder="••••••••" required>
            </div>
            
            <div id="error-message" class="hidden text-rose-400 text-sm font-medium text-center bg-rose-900/30 p-3 rounded-lg border border-rose-800/50">
                </div>

            <button type="submit" id="login-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white p-3.5 rounded-xl font-bold transition shadow-lg flex justify-center items-center">
                Se connecter
            </button>
        </form>

        <p class="text-center text-stone-500 text-sm mt-6">
            Protégé par Google Firebase
        </p>
    </div>

    <script type="module" src="./js/auth.js"></script>
</body>
</html>
