<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux - Tableau de bord</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M3 3v18h18'/><path d='m19 9-5 5-4-4-3 3'/></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Passage au thème Zinc (Gris neutre professionnel) */
        body { background-color: #09090b; color: #e4e4e7; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
        .chart-container { position: relative; width: 100%; height: 320px; }
        .doughnut-container { position: relative; width: 100%; height: 250px; }
        .month-card-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out, opacity 0.2s ease-out; opacity: 0; }
        .month-card-content.active { max-height: 2000px; opacity: 1; }
    </style>
</head>
<body class="antialiased selection:bg-zinc-800 selection:text-white font-sans flex flex-col min-h-screen">

    <header class="bg-zinc-900/80 backdrop-blur-md border-b border-zinc-800 sticky top-0 z-50 shadow-sm" data-html2canvas-ignore>
        <div class="max-w-[1500px] mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded bg-indigo-600 flex items-center justify-center shadow-sm">
                    <i data-lucide="bar-chart-2" class="w-5 h-5 text-white"></i>
                </div>
                <span class="text-xl font-bold text-white tracking-tight">Flux</span>
                <span id="save-status" class="hidden text-xs px-2 py-0.5 rounded border border-zinc-700 ml-4 font-medium text-zinc-400"></span>
            </div>
            <button onclick="window.logout()" class="text-sm font-medium text-zinc-400 hover:text-white transition-colors flex items-center gap-2 bg-zinc-900 px-4 py-2 rounded-md border border-zinc-800 hover:border-zinc-700">
                Se déconnecter <i data-lucide="log-out" class="w-4 h-4"></i>
            </button>
        </div>
    </header>

    <main id="export-area" class="flex-1 max-w-[1500px] w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 grid grid-cols-1 xl:grid-cols-12 gap-8">

        <div class="xl:col-span-8 space-y-6">
            
            <div class="bg-zinc-900 p-5 rounded-xl border border-zinc-800 shadow-sm flex flex-col md:flex-row items-center justify-between gap-4" data-html2canvas-ignore>
                <div class="flex items-center gap-2 bg-zinc-950 p-2 rounded-md border border-zinc-800">
                    <span class="text-[10px] font-semibold text-zinc-500 px-2 uppercase tracking-wider">Période</span>
                    <select id="filter-start" onchange="window.updateApp()" class="bg-zinc-950 text-zinc-200 text-sm focus:outline-none cursor-pointer"></select>
                    <i data-lucide="arrow-right" class="w-3 h-3 text-zinc-600"></i>
                    <select id="filter-end" onchange="window.updateApp()" class="bg-zinc-950 text-zinc-200 text-sm focus:outline-none cursor-pointer"></select>
                </div>

                <div class="flex-1 w-full flex flex-col justify-center px-4 border-l border-r border-zinc-800/50">
                    <div class="flex flex-wrap items-center gap-2 mb-2">
                        <input type="checkbox" id="goal-active" onchange="window.updateGoal()" class="w-4 h-4 text-indigo-600 bg-zinc-950 border-zinc-700 rounded cursor-pointer">
                        <span class="text-[10px] font-semibold text-zinc-500 uppercase tracking-widest">Objectif :</span>
                        <input type="text" id="goal-name" onchange="window.updateGoal()" placeholder="Description..." class="bg-transparent border-b border-zinc-700 focus:border-indigo-500 text-zinc-200 text-xs w-32 outline-none placeholder-zinc-600">
                        <input type="number" id="goal-input" onchange="window.updateGoal()" class="bg-zinc-950 border border-zinc-800 rounded px-2 py-0.5 text-zinc-200 w-24 text-xs font-mono" value="1000">
                        <span class="text-[10px] font-semibold text-zinc-500">EUR</span>
                        <span id="goal-percent" class="text-xs font-bold text-indigo-400 ml-auto hidden">0%</span>
                    </div>
                    <div id="goal-bar-container" class="w-full bg-zinc-950 rounded-full h-1.5 border border-zinc-800 overflow-hidden hidden">
                        <div id="goal-bar" class="bg-indigo-600 h-1.5 rounded-full transition-all duration-500 w-0"></div>
                    </div>
                </div>

                <button onclick="window.exportPDF()" class="bg-zinc-100 hover:bg-white text-zinc-900 text-sm font-semibold px-4 py-2.5 rounded-md transition shadow-sm flex items-center gap-2 whitespace-nowrap">
                    <i data-lucide="download" class="w-4 h-4"></i> Exporter
                </button>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div class="bg-zinc-900/50 p-5 rounded-xl border border-zinc-800 text-left shadow-sm">
                    <p class="text-[10px] font-semibold text-zinc-500 uppercase tracking-widest mb-1">Encaissements</p>
                    <p id="kpi-incomes" class="text-lg sm:text-2xl font-semibold text-emerald-500">0,00 €</p>
                </div>
                <div class="bg-zinc-900/50 p-5 rounded-xl border border-zinc-800 text-left shadow-sm">
                    <p class="text-[10px] font-semibold text-zinc-500 uppercase tracking-widest mb-1">Décaissements</p>
                    <p id="kpi-expenses" class="text-lg sm:text-2xl font-semibold text-rose-500">0,00 €</p>
                </div>
                <div class="bg-zinc-900 p-5 rounded-xl border border-indigo-900/30 text-left shadow-sm relative overflow-hidden">
                    <div class="absolute top-0 right-0 -mr-4 -mt-4 w-16 h-16 bg-indigo-500/10 rounded-full blur-xl"></div>
                    <p class="text-[10px] font-semibold text-zinc-400 uppercase tracking-widest mb-1 relative z-10">Trésorerie Nette</p>
                    <p id="kpi-balance" class="text-xl sm:text-3xl font-bold text-white relative z-10">0,00 €</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 bg-zinc-900 p-6 rounded-xl border border-zinc-800 shadow-sm">
                    <h2 class="text-xs font-semibold text-zinc-400 uppercase tracking-widest mb-4">Évolution du solde</h2>
                    <div class="chart-container"><canvas id="financeChart"></canvas></div>
                </div>
                <div class="lg:col-span-1 bg-zinc-900 p-6 rounded-xl border border-zinc-800 shadow-sm flex flex-col items-center justify-center">
                    <h2 class="text-xs font-semibold text-zinc-400 uppercase tracking-widest mb-4 w-full text-left">Répartition des charges</h2>
                    <div class="doughnut-container w-full"><canvas id="categoryChart"></canvas></div>
                </div>
            </div>

            <div>
                <div class="flex items-center justify-between mb-6 mt-8" data-html2canvas-ignore>
                    <h2 class="text-lg font-semibold text-zinc-100 tracking-tight">Historique mensuel</h2>
                    <button onclick="window.addNextMonth()" class="text-xs font-medium bg-zinc-800 hover:bg-zinc-700 text-zinc-200 px-3 py-1.5 rounded transition border border-zinc-700 flex items-center gap-1">
                        <i data-lucide="plus" class="w-3 h-3"></i> Nouvelle période
                    </button>
                </div>
                <div id="monthly-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
            </div>
        </div>

        <div class="xl:col-span-4" data-html2canvas-ignore>
            <div class="bg-zinc-900 p-6 rounded-xl border border-zinc-800 shadow-sm sticky top-24">
                <h2 id="form-title" class="text-base font-semibold text-white mb-6 flex items-center gap-2 border-b border-zinc-800 pb-4">
                    <i data-lucide="plus-circle" class="w-5 h-5 text-indigo-500"></i> Saisir une transaction
                </h2>

                <form onsubmit="window.handleAddTransaction(event)" id="transaction-form" class="space-y-4 mb-6">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-semibold text-zinc-500 mb-1.5 uppercase tracking-widest">Période</label>
                            <select id="form-month" class="w-full p-2.5 rounded-md border border-zinc-700 bg-zinc-950 text-zinc-200 text-sm focus:border-indigo-500 outline-none transition" required></select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-semibold text-zinc-500 mb-1.5 uppercase tracking-widest">Nature</label>
                            <select id="form-type" onchange="window.updateCategoryOptions()" class="w-full p-2.5 rounded-md border border-zinc-700 bg-zinc-950 text-zinc-200 text-sm focus:border-indigo-500 outline-none transition" required>
                                <option value="expenses">Décaissement (Sortie)</option>
                                <option value="incomes">Encaissement (Entrée)</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-semibold text-zinc-500 mb-1.5 uppercase tracking-widest">Catégorie</label>
                        <select id="form-category" class="w-full p-2.5 rounded-md border border-zinc-700 bg-zinc-950 text-zinc-200 text-sm focus:border-indigo-500 outline-none transition" required></select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-semibold text-zinc-500 mb-1.5 uppercase tracking-widest">Description</label>
                        <input type="text" id="form-label" placeholder="Ex: Fournisseur, Salaire..." class="w-full p-2.5 rounded-md border border-zinc-700 bg-zinc-950 text-zinc-200 text-sm focus:border-indigo-500 outline-none transition placeholder-zinc-600" required>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-semibold text-zinc-500 mb-1.5 uppercase tracking-widest">Montant (EUR)</label>
                            <input type="number" id="form-amount" step="0.01" min="0" placeholder="0.00" class="w-full p-2.5 rounded-md border border-zinc-700 bg-zinc-950 text-zinc-200 text-sm font-mono focus:border-indigo-500 outline-none transition placeholder-zinc-600" required>
                        </div>
                        <div>
                            <label class="block text-[10px] font-semibold text-zinc-500 mb-1.5 uppercase tracking-widest">Jour d'exécution</label>
                            <input type="number" id="form-day" min="1" max="31" placeholder="Ex: 5" class="w-full p-2.5 rounded-md border border-zinc-700 bg-zinc-950 text-zinc-200 text-sm font-mono focus:border-indigo-500 outline-none transition placeholder-zinc-600" required>
                        </div>
                    </div>

                    <div id="recurring-container" class="mt-4 pt-4 border-t border-zinc-800">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="form-recurring" onchange="window.toggleRecurringOptions()" class="w-4 h-4 text-indigo-600 bg-zinc-950 border-zinc-700 rounded focus:ring-indigo-500 cursor-pointer">
                            <label for="form-recurring" class="text-xs text-zinc-400 cursor-pointer font-medium hover:text-zinc-200">Planifier une récurrence</label>
                        </div>
                        
                        <div id="recurring-duration-container" class="hidden mt-3 pl-6">
                            <label class="block text-[10px] font-semibold text-zinc-500 mb-1.5 uppercase tracking-widest">Durée de l'engagement</label>
                            <select id="form-recurring-duration" class="w-full p-2 rounded-md border border-zinc-700 bg-zinc-950 text-zinc-200 text-xs focus:border-indigo-500 outline-none transition">
                                <option value="all">Jusqu'à la fin de l'exercice</option>
                                <option value="2">2 mois</option>
                                <option value="3">1 trimestre (3 mois)</option>
                                <option value="6">1 semestre (6 mois)</option>
                                <option value="12">1 an (12 mois)</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex gap-2 pt-2">
                        <button type="submit" id="submit-btn" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-medium text-sm py-2.5 rounded-md transition flex justify-center items-center gap-2">
                            Enregistrer
                        </button>
                        <button type="button" id="cancel-edit-btn" onclick="window.cancelEdit()" class="hidden bg-zinc-800 hover:bg-zinc-700 text-zinc-300 font-medium py-2.5 px-3 rounded-md transition flex justify-center items-center">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                    </div>
                </form>

                <div class="pt-4 border-t border-zinc-800">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-[10px] font-semibold text-zinc-500 uppercase tracking-widest">Édition rapide</h3>
                        <button onclick="window.resetData()" class="text-[10px] font-semibold text-rose-500/70 hover:text-rose-400 transition">Réinitialiser la base</button>
                    </div>
                    <div id="editor-lists-container" class="max-h-64 overflow-y-auto pr-2 space-y-2"></div>
                </div>
            </div>
        </div>

    </main>

    <script type="module" src="./js/dashboard.js"></script>
    <script>
        // Initialisation des icônes au chargement
        lucide.createIcons();
    </script>
</body>
</html>
